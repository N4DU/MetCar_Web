<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa con Pin</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #eeeeee;
    }

    .mapa {
        width: 500px;
        height: 500px;
        overflow: hidden;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    iframe {
        width: 100%;
        height: 100%;
        border: 0;
    }
</style>

</head>

<body>

<div class="mapa">

    <iframe
        src="https://www.google.com/maps?q=Walt+Disney+Concert+Hall,+Los+Angeles,+CA&output=embed"
        loading="lazy">
    </iframe>

</div>

</body>
</html>
