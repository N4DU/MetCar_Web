let currentPhase = 0;
const checkedMap = {};

function countAll() {
  let total = 0;
  phases.forEach((p, pi) => p.sections.forEach((s, si) => s.questions.forEach((q, qi) => {
    total++;
  })));
  return total;
}

function countDone() {
  return Object.values(checkedMap).filter(Boolean).length;
}

function updateStats() {
  const total = countAll();
  const done = countDone();
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-pct').textContent = Math.round((done/total)*100) + '%';
}

function getPhaseProgress(pi) {
  let total = 0, done = 0;
  phases[pi].sections.forEach((s, si) => s.questions.forEach((q, qi) => {
    total++;
    if (checkedMap[`${pi}-${si}-${qi}`]) done++;
  }));
  return { total, done };
}

function toggleCheck(pi, si, qi) {
  const key = `${pi}-${si}-${qi}`;
  checkedMap[key] = !checkedMap[key];
  const el = document.getElementById(`chk-${key}`);
  const txt = document.getElementById(`txt-${key}`);
  if (el) {
    el.classList.toggle('checked', checkedMap[key]);
    el.textContent = checkedMap[key] ? '✓' : '';
  }
  if (txt) txt.classList.toggle('checked', checkedMap[key]);
  updateStats();
  updateProgressBar();
}

function toggleSection(id) {
  const q = document.getElementById('q-' + id);
  const chv = document.getElementById('chv-' + id);
  if (!q) return;
  q.classList.toggle('open');
  chv.classList.toggle('open');
}

function updateProgressBar() {
  const bar = document.getElementById('progress-bar');
  bar.innerHTML = '';
  phases.forEach((p, pi) => {
    const { total, done } = getPhaseProgress(pi);
    const div = document.createElement('div');
    div.className = 'prog-step';
    div.title = p.name;
    div.onclick = () => goToPhase(pi);
    if (pi === currentPhase) div.classList.add('active');
    else if (done === total && total > 0) div.classList.add('done');
    bar.appendChild(div);
  });
}

function renderPhaseNav() {
  const nav = document.getElementById('phase-nav');
  nav.innerHTML = '';
  phases.forEach((p, pi) => {
    const btn = document.createElement('button');
    btn.className = 'phase-btn' + (pi === currentPhase ? ' active' : '');
    btn.innerHTML = p.icon + ' ' + p.name;
    btn.onclick = () => goToPhase(pi);
    nav.appendChild(btn);
  });
}

function renderPhase(pi) {
  const p = phases[pi];
  const { total, done } = getPhaseProgress(pi);
  let html = `<div class="phase-card">
    <div class="phase-header">
      <div class="phase-icon" style="${p.color}">${p.icon}</div>
      <div class="phase-meta">
        <h2>${p.name}</h2>
        <p>${p.desc}</p>
      </div>
      <span class="phase-badge" style="${p.color}">${p.badgeText}</span>
    </div>
    <div class="sections">`;

  p.sections.forEach((s, si) => {
    const secId = `${pi}-${si}`;
    html += `<div class="section">
      <div class="section-header" onclick="toggleSection('${secId}')">
        <span class="section-title">${s.title}</span>
        <span class="section-count">${s.questions.length} preguntas</span>
        <span class="chevron" id="chv-${secId}">▼</span>
      </div>
      <div class="questions" id="q-${secId}">`;
    s.questions.forEach((q, qi) => {
      const key = `${pi}-${si}-${qi}`;
      const isChecked = checkedMap[key];
      html += `<div class="question-item">
        <div class="q-check ${isChecked ? 'checked' : ''}" id="chk-${key}" onclick="toggleCheck(${pi},${si},${qi})">${isChecked ? '✓' : ''}</div>
        <span class="q-text ${isChecked ? 'checked' : ''}" id="txt-${key}" onclick="toggleCheck(${pi},${si},${qi})">${q.text}</span>
        <span class="q-tag tag-${q.tag}">${q.tag}</span>
      </div>`;
    });
    html += `</div></div>`;
  });

  html += `</div></div>`;
  document.getElementById('phase-content').innerHTML = html;
  document.getElementById('phase-indicator').textContent = `Fase ${pi + 1} de ${phases.length} · ${done}/${total} respondidas`;
  document.getElementById('btn-prev').style.visibility = pi === 0 ? 'hidden' : 'visible';
  document.getElementById('btn-next').textContent = pi === phases.length - 1 ? '✓ Plan completado' : 'Siguiente →';
}

function goToPhase(pi) {
  currentPhase = pi;
  renderPhaseNav();
  renderPhase(pi);
  updateProgressBar();
}

function navigate(dir) {
  const next = currentPhase + dir;
  if (next >= 0 && next < phases.length) goToPhase(next);
}

goToPhase(0);
updateStats();
updateProgressBar();
</script>
